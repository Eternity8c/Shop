global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "auth-service"
    static_configs:
      - targets: ["auth-service:8080"]
        labels:
          service: "auth-service"

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
