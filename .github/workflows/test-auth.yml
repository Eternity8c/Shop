name: golang-tests
run-name: tests 
on:
    push:
        branches:
          - main
    pull_request:
permissions:
    contents: read
jobs:
    tests-auth:
      name: Run auth tests
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v6
        - uses: actions/setup-go@v6
          with:
            go-version: '1.25.6'
        - name: Run auth tests
          working-directory: ./auth-service
          env:
            CONFIG_PATH: ./configs/.env
          run: go test ./... -v -count=1
    tests-api:
      name: Run api tests
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v6
        - uses: actions/setup-go@v6
          with:
            go-version: '1.25.6'
        - name: Run auth tests
          working-directory: ./api-gateway
          env:
            CONFIG_PATH: ./configs/.env
          run: go test ./... -v -count=1